name: Update Stock Signals

concurrency:
group: update-signals
cancel-in-progress: false

on:
schedule:
# 11:00 UTC = 4:30 PM IST, Monday-Friday
- cron: "0 11 * * 1-5"
workflow_dispatch: {}

permissions:
contents: write

jobs:
update-signals:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      pip install -r requirements.txt

  - name: Fetch signals
    run: |
      python fetch_signals.py

  - name: Commit and push signals.json
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

      git add signals.json

      # Exit if there are no changes
      git diff --staged --quiet && exit 0

      git commit -m "Update signals $(date -u +'%Y-%m-%d %H:%M UTC')"

      # Sync with latest main branch
      git pull --rebase origin main

      # Push changes
      git push origin main
```
